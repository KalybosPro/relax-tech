name: relax_image_picker
description: "A powerful, WhatsApp-like media picker for Flutter"
version: 1.0.0

homepage: https://github.com/KalybosPro/relax_image_picker
repository: https://github.com/KalybosPro/relax_image_picker
issue_tracker: https://github.com/KalybosPro/relax_image_picker/issues

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  photo_manager: ^3.3.0
  file_picker: ^5.2.0
  camera: ^0.11.0+3
  flutter_image_compress: ^2.3.0
  path_provider: ^2.1.3
  permission_handler: ^11.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0


flutter:
  uses-material-design: true
