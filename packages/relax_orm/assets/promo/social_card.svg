<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#050A10"/>
      <stop offset="100%" style="stop-color:#0D1117"/>
    </linearGradient>
    <linearGradient id="beam" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6EE7B7;stop-opacity:0"/>
      <stop offset="30%" style="stop-color:#6EE7B7;stop-opacity:0.6"/>
      <stop offset="70%" style="stop-color:#3B82F6;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#3B82F6;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="title3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6EE7B7"/>
      <stop offset="100%" style="stop-color:#60A5FA"/>
    </linearGradient>
    <filter id="soft-glow">
      <feGaussianBlur stdDeviation="20" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="text-glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="clip-card">
      <rect x="620" y="60" width="520" height="510" rx="20"/>
    </clipPath>
  </defs>

  <rect width="1200" height="630" fill="url(#bg3)"/>

  <!-- Ambient glows -->
  <circle cx="200" cy="315" r="300" fill="#6EE7B7" opacity="0.04" filter="url(#soft-glow)"/>
  <circle cx="1000" cy="315" r="250" fill="#3B82F6" opacity="0.05" filter="url(#soft-glow)"/>

  <!-- Horizontal light beam -->
  <rect x="0" y="314" width="1200" height="2" fill="url(#beam)" opacity="0.3"/>

  <!-- === LEFT TEXT === -->
  <!-- Logo -->
  <g transform="translate(80, 140)">
    <rect x="0" y="0" width="64" height="64" rx="16" fill="#6EE7B7" opacity="0.15" stroke="#6EE7B7" stroke-width="1.5"/>
    <text x="32" y="44" font-family="'Courier New', monospace" font-size="32" font-weight="900" fill="#6EE7B7" text-anchor="middle" filter="url(#text-glow)">R</text>

    <text x="84" y="32" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="42" font-weight="800" fill="url(#title3)" letter-spacing="-0.5">relax_orm</text>
    <text x="84" y="58" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" fill="#8B949E" letter-spacing="2">FOR FLUTTER</text>
  </g>

  <!-- Big headline -->
  <text x="80" y="278" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="46" font-weight="800" fill="#F0F6FC">Local-first.</text>
  <text x="80" y="334" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="46" font-weight="800" fill="#F0F6FC">Offline-ready.</text>
  <text x="80" y="390" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="46" font-weight="800" fill="url(#title3)">Zero SaaS.</text>

  <!-- Bullet points -->
  <g font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" fill="#8B949E">
    <text x="80" y="436">
      <tspan fill="#6EE7B7" font-size="18">✓ </tspan>
      <tspan>Real-time streams  </tspan>
      <tspan fill="#6EE7B7" font-size="18">✓ </tspan>
      <tspan>AES encryption</tspan>
    </text>
    <text x="80" y="462">
      <tspan fill="#6EE7B7" font-size="18">✓ </tspan>
      <tspan>Auto sync engine  </tspan>
      <tspan fill="#6EE7B7" font-size="18">✓ </tspan>
      <tspan>Code generation</tspan>
    </text>
    <text x="80" y="488">
      <tspan fill="#6EE7B7" font-size="18">✓ </tspan>
      <tspan>Fluent query builder  </tspan>
      <tspan fill="#6EE7B7" font-size="18">✓ </tspan>
      <tspan>Bring your own API</tspan>
    </text>
  </g>

  <!-- Install command box -->
  <rect x="80" y="510" width="460" height="78" rx="10" fill="#161B22" stroke="#30363D" stroke-width="1"/>
  <text x="104" y="535" font-family="'Cascadia Code','Fira Code','Courier New',monospace" font-size="14" fill="#8B949E">$</text>
  <text x="122" y="535" font-family="'Cascadia Code','Fira Code','Courier New',monospace" font-size="14" fill="#E6EDF3">flutter pub add </text>
  <text x="298" y="535" font-family="'Cascadia Code','Fira Code','Courier New',monospace" font-size="14" fill="#6EE7B7">relax_orm</text>
  <text x="104" y="557" font-family="'Cascadia Code','Fira Code','Courier New',monospace" font-size="14" fill="#8B949E">$</text>
  <text x="122" y="557" font-family="'Cascadia Code','Fira Code','Courier New',monospace" font-size="14" fill="#E6EDF3">dart pub add dev:</text>
  <text x="296" y="557" font-family="'Cascadia Code','Fira Code','Courier New',monospace" font-size="14" fill="#A78BFA">relax_orm_generator</text>
  <text x="104" y="579" font-family="'Cascadia Code','Fira Code','Courier New',monospace" font-size="14" fill="#8B949E">$</text>
  <text x="122" y="579" font-family="'Cascadia Code','Fira Code','Courier New',monospace" font-size="14" fill="#E6EDF3">dart pub add dev:</text>
  <text x="296" y="579" font-family="'Cascadia Code','Fira Code','Courier New',monospace" font-size="14" fill="#F59E0B">build_runner</text>

  <!-- === RIGHT: Architecture diagram === -->
  <g transform="translate(620, 60)">
    <rect width="520" height="510" rx="20" fill="#0D1117" stroke="#21262D" stroke-width="1.5"/>

    <!-- top bar -->
    <rect width="520" height="44" rx="20" fill="#161B22"/>
    <rect y="28" width="520" height="16" fill="#161B22"/>
    <circle cx="24" cy="22" r="6" fill="#FF5F57"/>
    <circle cx="44" cy="22" r="6" fill="#FEBC2E"/>
    <circle cx="64" cy="22" r="6" fill="#28C840"/>
    <text x="260" y="28" font-family="monospace" font-size="12" fill="#6E7681" text-anchor="middle">Architecture</text>

    <!-- arch boxes -->
    <g font-family="-apple-system, 'Segoe UI', sans-serif">

      <!-- App layer -->
      <rect x="30" y="68" width="460" height="56" rx="10" fill="#1C2232" stroke="#3B82F6" stroke-width="1" stroke-dasharray="4,3"/>
      <text x="260" y="97" font-size="15" font-weight="600" fill="#93C5FD" text-anchor="middle">Your Flutter App</text>
      <text x="260" y="115" font-size="11" fill="#6E7681" text-anchor="middle">@RelaxTable models · UI widgets</text>

      <!-- down arrow -->
      <text x="260" y="146" font-size="18" fill="#374151" text-anchor="middle">↕</text>

      <!-- ORM layer -->
      <rect x="30" y="154" width="460" height="80" rx="10" fill="#162032" stroke="#6EE7B7" stroke-width="1.5"/>
      <text x="260" y="178" font-size="15" font-weight="700" fill="#6EE7B7" text-anchor="middle">RelaxORM</text>
      <text x="120" y="200" font-size="12" fill="#A7F3D0" text-anchor="middle">RelaxDB</text>
      <text x="260" y="200" font-size="12" fill="#A7F3D0" text-anchor="middle">Collection&lt;T&gt;</text>
      <text x="400" y="200" font-size="12" fill="#A7F3D0" text-anchor="middle">QueryBuilder</text>
      <line x1="170" y1="195" x2="170" y2="215" stroke="#6EE7B7" stroke-width="0.5" opacity="0.3"/>
      <line x1="350" y1="195" x2="350" y2="215" stroke="#6EE7B7" stroke-width="0.5" opacity="0.3"/>
      <text x="120" y="218" font-size="10" fill="#6E7681" text-anchor="middle">entry point</text>
      <text x="260" y="218" font-size="10" fill="#6E7681" text-anchor="middle">typed CRUD</text>
      <text x="400" y="218" font-size="10" fill="#6E7681" text-anchor="middle">fluent API</text>

      <!-- down arrow -->
      <text x="260" y="252" font-size="18" fill="#374151" text-anchor="middle">↕</text>

      <!-- Sync layer -->
      <rect x="30" y="258" width="460" height="70" rx="10" fill="#1C1020" stroke="#A78BFA" stroke-width="1"/>
      <text x="260" y="280" font-size="15" font-weight="700" fill="#C4B5FD" text-anchor="middle">Sync Engine</text>
      <text x="130" y="302" font-size="12" fill="#DDD6FE" text-anchor="middle">SyncEngine</text>
      <text x="260" y="302" font-size="12" fill="#DDD6FE" text-anchor="middle">OfflineQueue</text>
      <text x="390" y="302" font-size="12" fill="#DDD6FE" text-anchor="middle">ConflictResolver</text>
      <text x="130" y="318" font-size="10" fill="#6E7681" text-anchor="middle">push / pull</text>
      <text x="260" y="318" font-size="10" fill="#6E7681" text-anchor="middle">persisted ops</text>
      <text x="390" y="318" font-size="10" fill="#6E7681" text-anchor="middle">local/remote wins</text>

      <!-- down arrow -->
      <text x="260" y="350" font-size="18" fill="#374151" text-anchor="middle">↕</text>

      <!-- SQLite layer -->
      <rect x="30" y="358" width="220" height="56" rx="10" fill="#0F2027" stroke="#0EA5E9" stroke-width="1"/>
      <text x="140" y="382" font-size="13" font-weight="600" fill="#7DD3FC" text-anchor="middle">Drift (SQLite)</text>
      <text x="140" y="402" font-size="11" fill="#6E7681" text-anchor="middle">storage · migrations</text>

      <rect x="270" y="358" width="220" height="56" rx="10" fill="#0F1A0F" stroke="#4ADE80" stroke-width="1"/>
      <text x="380" y="382" font-size="13" font-weight="600" fill="#86EFAC" text-anchor="middle">SQLite3MC</text>
      <text x="380" y="402" font-size="11" fill="#6E7681" text-anchor="middle">AES encryption</text>

      <!-- Your API box at bottom right -->
      <rect x="30" y="436" width="460" height="48" rx="10" fill="#1A1210" stroke="#F87171" stroke-width="1" stroke-dasharray="5,3"/>
      <text x="260" y="458" font-size="13" fill="#FCA5A5" text-anchor="middle">Your Backend API</text>
      <text x="260" y="476" font-size="11" fill="#6E7681" text-anchor="middle">REST · GraphQL · WebSocket — you own it</text>
    </g>
  </g>

  <!-- bottom footer bar -->
  <rect x="0" y="604" width="1200" height="26" fill="#0A0E13"/>
  <text x="600" y="621" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#484F58" text-anchor="middle">pub.dev/packages/relax_orm · MIT · Inspired by Firebase &amp; PowerSync — but free and self-hosted</text>
</svg>
