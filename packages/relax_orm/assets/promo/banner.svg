<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0D1117"/>
      <stop offset="100%" style="stop-color:#161B22"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6EE7B7"/>
      <stop offset="100%" style="stop-color:#3B82F6"/>
    </linearGradient>
    <linearGradient id="card1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1C2A3A"/>
      <stop offset="100%" style="stop-color:#162032"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1280" height="640" fill="url(#bg)"/>

  <!-- Grid lines subtle -->
  <g opacity="0.04" stroke="#6EE7B7" stroke-width="1">
    <line x1="0" y1="80" x2="1280" y2="80"/>
    <line x1="0" y1="160" x2="1280" y2="160"/>
    <line x1="0" y1="240" x2="1280" y2="240"/>
    <line x1="0" y1="320" x2="1280" y2="320"/>
    <line x1="0" y1="400" x2="1280" y2="400"/>
    <line x1="0" y1="480" x2="1280" y2="480"/>
    <line x1="0" y1="560" x2="1280" y2="560"/>
    <line x1="160" y1="0" x2="160" y2="640"/>
    <line x1="320" y1="0" x2="320" y2="640"/>
    <line x1="480" y1="0" x2="480" y2="640"/>
    <line x1="640" y1="0" x2="640" y2="640"/>
    <line x1="800" y1="0" x2="800" y2="640"/>
    <line x1="960" y1="0" x2="960" y2="640"/>
    <line x1="1120" y1="0" x2="1120" y2="640"/>
  </g>

  <!-- Glowing orb left -->
  <circle cx="120" cy="320" r="220" fill="#3B82F6" opacity="0.06"/>
  <!-- Glowing orb right -->
  <circle cx="1160" cy="300" r="180" fill="#6EE7B7" opacity="0.06"/>

  <!-- LEFT side — branding -->
  <g transform="translate(80, 180)">
    <!-- Logo mark -->
    <rect x="0" y="0" width="56" height="56" rx="14" fill="url(#accent)" opacity="0.9"/>
    <text x="28" y="39" font-family="monospace" font-size="28" font-weight="700" fill="#0D1117" text-anchor="middle">R</text>

    <!-- Title -->
    <text x="0" y="112" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="62" font-weight="800" fill="#F0F6FC" letter-spacing="-1">relax_orm</text>

    <!-- Gradient underline -->
    <rect x="0" y="124" width="380" height="4" rx="2" fill="url(#accent)"/>

    <!-- Tagline -->
    <text x="0" y="168" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="22" fill="#8B949E">Local-first ORM for Flutter</text>
    <text x="0" y="200" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="18" fill="#6E7681">Offline · Sync · Encrypted · Zero SaaS</text>

    <!-- Badges -->
    <g transform="translate(0, 240)">
      <rect x="0" y="0" width="100" height="32" rx="16" fill="#1C2A3A" stroke="#30363D" stroke-width="1"/>
      <text x="50" y="21" font-family="monospace" font-size="13" fill="#6EE7B7" text-anchor="middle">Flutter</text>

      <rect x="114" y="0" width="80" height="32" rx="16" fill="#1C2A3A" stroke="#30363D" stroke-width="1"/>
      <text x="154" y="21" font-family="monospace" font-size="13" fill="#3B82F6" text-anchor="middle">Dart</text>

      <rect x="208" y="0" width="64" height="32" rx="16" fill="#1C2A3A" stroke="#30363D" stroke-width="1"/>
      <text x="240" y="21" font-family="monospace" font-size="13" fill="#F59E0B" text-anchor="middle">MIT</text>
    </g>
  </g>

  <!-- RIGHT side — code card -->
  <g transform="translate(620, 80)" filter="url(#shadow)">
    <rect x="0" y="0" width="580" height="480" rx="16" fill="#161B22" stroke="#30363D" stroke-width="1"/>

    <!-- Window bar -->
    <rect x="0" y="0" width="580" height="44" rx="16" fill="#1C2232"/>
    <rect x="0" y="30" width="580" height="14" fill="#1C2232"/>
    <!-- traffic lights -->
    <circle cx="24" cy="22" r="7" fill="#FF5F57"/>
    <circle cx="46" cy="22" r="7" fill="#FEBC2E"/>
    <circle cx="68" cy="22" r="7" fill="#28C840"/>
    <!-- tab label -->
    <text x="290" y="28" font-family="monospace" font-size="13" fill="#8B949E" text-anchor="middle">example.dart</text>

    <!-- Code lines -->
    <g font-family="'Cascadia Code', 'Fira Code', 'Courier New', monospace" font-size="15">
      <!-- Line 1 -->
      <text x="28" y="90">
        <tspan fill="#8B949E">// Open the database</tspan>
      </text>
      <!-- Line 2 -->
      <text x="28" y="118">
        <tspan fill="#79C0FF">final</tspan>
        <tspan fill="#E6EDF3"> db = </tspan>
        <tspan fill="#56D364">await</tspan>
        <tspan fill="#E6EDF3"> RelaxDB.</tspan>
        <tspan fill="#D2A8FF">open</tspan>
        <tspan fill="#E6EDF3">(</tspan>
      </text>
      <text x="28" y="143">
        <tspan fill="#E6EDF3">  name: </tspan>
        <tspan fill="#A5D6FF">'my_app'</tspan>
        <tspan fill="#E6EDF3">,</tspan>
      </text>
      <text x="28" y="168">
        <tspan fill="#E6EDF3">  schemas: [userSchema],</tspan>
      </text>
      <text x="28" y="193">
        <tspan fill="#E6EDF3">  encryptionKey: </tspan>
        <tspan fill="#A5D6FF">'secret'</tspan>
        <tspan fill="#E6EDF3">,</tspan>
      </text>
      <text x="28" y="218">
        <tspan fill="#E6EDF3">);</tspan>
      </text>

      <!-- blank -->
      <text x="28" y="252">
        <tspan fill="#8B949E">// Typed CRUD</tspan>
      </text>
      <text x="28" y="278">
        <tspan fill="#79C0FF">final</tspan>
        <tspan fill="#E6EDF3"> users = db.</tspan>
        <tspan fill="#D2A8FF">collection</tspan>
        <tspan fill="#E6EDF3">&lt;User&gt;();</tspan>
      </text>
      <text x="28" y="303">
        <tspan fill="#56D364">await</tspan>
        <tspan fill="#E6EDF3"> users.</tspan>
        <tspan fill="#D2A8FF">add</tspan>
        <tspan fill="#E6EDF3">(alice);</tspan>
      </text>

      <!-- blank -->
      <text x="28" y="337">
        <tspan fill="#8B949E">// Real-time stream</tspan>
      </text>
      <text x="28" y="363">
        <tspan fill="#E6EDF3">users.</tspan>
        <tspan fill="#D2A8FF">watchAll</tspan>
        <tspan fill="#E6EDF3">().</tspan>
        <tspan fill="#D2A8FF">listen</tspan>
        <tspan fill="#E6EDF3">((list) {</tspan>
      </text>
      <text x="28" y="388">
        <tspan fill="#E6EDF3">  setState(() => _users = list);</tspan>
      </text>
      <text x="28" y="413">
        <tspan fill="#E6EDF3">});</tspan>
      </text>

      <!-- cursor blink -->
      <rect x="28" y="425" width="10" height="20" fill="#6EE7B7" opacity="0.9" rx="1"/>
    </g>
  </g>

  <!-- Bottom bar -->
  <rect x="0" y="590" width="1280" height="50" fill="#0D1117"/>
  <text x="80" y="621" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" fill="#484F58">relax_orm + relax_orm_generator</text>
  <text x="1200" y="621" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" fill="#484F58" text-anchor="end">v0.1.4</text>
  <rect x="0" y="590" width="1280" height="2" fill="url(#accent)" opacity="0.5"/>
</svg>
