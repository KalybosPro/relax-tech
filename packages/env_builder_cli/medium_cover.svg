<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d1b2a"/>
      <stop offset="0.55" stop-color="#102a43"/>
      <stop offset="1" stop-color="#0a1628"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#27e8a7"/>
      <stop offset="1" stop-color="#13b9fd"/>
    </linearGradient>
    <linearGradient id="term" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#13233a"/>
      <stop offset="1" stop-color="#0c1a2e"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="30" flood-color="#000000" flood-opacity="0.45"/>
    </filter>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="40" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- background -->
  <rect width="1600" height="900" fill="url(#bg)"/>

  <!-- ambient glows -->
  <circle cx="1320" cy="180" r="200" fill="#13b9fd" opacity="0.16" filter="url(#glow)"/>
  <circle cx="250" cy="760" r="220" fill="#27e8a7" opacity="0.12" filter="url(#glow)"/>

  <!-- dotted grid texture -->
  <g fill="#3a5a82" opacity="0.25">
    <g>
      <circle cx="0" cy="0" r="2"/>
    </g>
  </g>
  <g fill="#9fc7ef" opacity="0.08">
    <!-- sparse dots -->
    <circle cx="120" cy="120" r="3"/><circle cx="220" cy="200" r="2"/><circle cx="80" cy="300" r="2"/>
    <circle cx="1450" cy="640" r="3"/><circle cx="1380" cy="740" r="2"/><circle cx="1520" cy="500" r="2"/>
    <circle cx="1480" cy="820" r="2"/><circle cx="60" cy="540" r="2"/>
  </g>

  <!-- accent bar -->
  <rect x="120" y="150" width="74" height="8" rx="4" fill="url(#accent)"/>

  <!-- eyebrow -->
  <text x="120" y="210" fill="#9fc7ef" font-size="26" font-weight="600" letter-spacing="6">FLUTTER · DART · DEV TOOLS</text>

  <!-- title -->
  <text x="118" y="300" fill="#ffffff" font-size="76" font-weight="800" letter-spacing="-1">env_builder_cli</text>

  <!-- subtitle lines -->
  <text x="120" y="372" fill="#cfe3f7" font-size="40" font-weight="600">Type-safe environments for Flutter,</text>
  <text x="120" y="424" fill="#cfe3f7" font-size="40" font-weight="600">in a single command.</text>

  <!-- feature pills -->
  <g font-size="24" font-weight="600">
    <g>
      <rect x="120" y="470" width="232" height="54" rx="27" fill="#16314f" stroke="#27e8a7" stroke-opacity="0.5"/>
      <text x="236" y="505" fill="#bdf3df" text-anchor="middle">🔐 AES encryption</text>
    </g>
    <g>
      <rect x="368" y="470" width="252" height="54" rx="27" fill="#16314f" stroke="#13b9fd" stroke-opacity="0.5"/>
      <text x="494" y="505" fill="#c6e8ff" text-anchor="middle">📝 Compile-time safe</text>
    </g>
    <g>
      <rect x="636" y="470" width="244" height="54" rx="27" fill="#16314f" stroke="#27e8a7" stroke-opacity="0.5"/>
      <text x="758" y="505" fill="#bdf3df" text-anchor="middle">🎨 Embedded assets</text>
    </g>
  </g>

  <!-- terminal card -->
  <g filter="url(#soft)">
    <rect x="118" y="566" width="900" height="232" rx="18" fill="url(#term)" stroke="#22456b" stroke-width="1.5"/>
    <!-- titlebar -->
    <rect x="118" y="566" width="900" height="48" rx="18" fill="#0e2138"/>
    <rect x="118" y="596" width="900" height="18" fill="#0e2138"/>
    <circle cx="150" cy="590" r="8" fill="#ff5f57"/>
    <circle cx="178" cy="590" r="8" fill="#febc2e"/>
    <circle cx="206" cy="590" r="8" fill="#28c840"/>
    <text x="540" y="596" fill="#5b7da3" font-size="18" text-anchor="middle" font-family="monospace">bash — your_flutter_project</text>

    <!-- commands -->
    <g font-family="'JetBrains Mono','Fira Code',Consolas,monospace" font-size="24">
      <text x="150" y="664"><tspan fill="#27e8a7">$</tspan><tspan fill="#e6f1fb"> dart pub global activate env_builder_cli</tspan></text>
      <text x="150" y="708"><tspan fill="#27e8a7">$</tspan><tspan fill="#e6f1fb"> env_builder build</tspan></text>
      <text x="150" y="752"><tspan fill="#5b7da3">  ✓ generated </tspan><tspan fill="#13b9fd">packages/env</tspan><tspan fill="#5b7da3"> · type-safe · encrypted</tspan></text>
    </g>
  </g>

  <!-- right side icon mark -->
  <g transform="translate(1230 360)" opacity="0.95">
    <rect x="-110" y="-110" width="220" height="220" rx="44" fill="#0e2138" stroke="url(#accent)" stroke-width="3"/>
    <!-- shield -->
    <path d="M0 -64 L62 -36 L62 18 C62 60 34 88 0 100 C-34 88 -62 60 -62 18 L-62 -36 Z"
          fill="none" stroke="url(#accent)" stroke-width="6" stroke-linejoin="round"/>
    <!-- keyhole -->
    <circle cx="0" cy="-2" r="20" fill="url(#accent)"/>
    <rect x="-7" y="6" width="14" height="34" rx="6" fill="url(#accent)"/>
  </g>

  <!-- footer -->
  <text x="120" y="852" fill="#6f93b8" font-size="22" font-weight="500">pub.dev/packages/env_builder_cli</text>
  <text x="1480" y="852" fill="#6f93b8" font-size="22" font-weight="500" text-anchor="end">Made with ❤️ for the Flutter community</text>
</svg>
