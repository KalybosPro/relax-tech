  sdk: ^3.8.1

# Add regular dependencies here.
dependencies:
  analyzer: ^12.1.0
  args: ^2.7.0
  build: ^4.0.5
  build_runner: ^2.13.1
  cli_util: ^0.4.2
  crypto: ^3.0.7
  encrypt: ^5.0.3
  image: ^4.8.0
  path: ^1.9.1
  source_gen: ^4.2.2
  universal_io: ^2.3.1
