version: 1.3.1
repository: https://github.com/KalybosPro/relax-tech/tree/main/packages/env_builder_cli
homepage: https://github.com/KalybosPro/relax-tech/tree/main/packages/env_builder_cli
issue_tracker: https://github.com/KalybosPro/relax-tech/issues

